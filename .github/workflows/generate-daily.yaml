name: Generate Daily Report
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate daily report
        run: python scripts/generate_daily.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and push
        id: commit
        run: |
          git config user.name "security-bot"
          git config user.email "bot@servicewall.dev"
          git add content/cn/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git commit -m "daily: auto-generate report $(date +%Y-%m-%d)"
            git push
          fi

      - name: Install Hugo CLI
        if: steps.commit.outputs.has_changes == 'true'
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.157.0/hugo_extended_0.157.0_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        if: steps.commit.outputs.has_changes == 'true'
        run: sudo snap install dart-sass

      - name: Setup Pages
        if: steps.commit.outputs.has_changes == 'true'
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        if: steps.commit.outputs.has_changes == 'true'
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/deploy-pages@v4
