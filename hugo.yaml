# Hugo configuration file
title: 数据安全洞察日报 | 数据安全 & API安全 每日精选

timezone: Asia/Shanghai
enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
hasCJKLanguage: true
enableInlineShortcodes: true

baseURL: https://servicewall.github.io/news/

outputs:
  home: [html]
  page: [html]
  section: [html, rss]

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - identifier: documentation
      name: 数据安全日报
      pageRef: /
      weight: 1
    - identifier: blog
      name: 安全周报
      pageRef: /blog
      weight: 2
    - identifier: about
      name: 关于
      pageRef: /about
      weight: 3
    - identifier: search
      name: 搜索
      weight: 4
      params:
        type: search
    - identifier: github
      name: GitHub
      weight: 5
      url: "https://github.com/servicewall/news"
      params:
        icon: github

params:
  description: 专注数据安全与API安全的每日资讯聚合站。为您精选国内外数据泄露、合规政策、API漏洞等前沿动态，洞悉数据安全最新趋势。

  author:
    name: "数据安全洞察日报"
    email: ""

  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: https://demo.servicewall.cn/favicon.png
      dark: https://demo.servicewall.cn/favicon.png
      width: 175
      height: 50

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 10
    article:
      displayPagination: true

  toc:
    displayTags: false

  page:
    width: wide

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content

defaultContentLanguage: zh
languages:
  zh:
    languageCode: zh-CN
    contentDir: content/cn
    languageName: 简体中文
    weight: 1
